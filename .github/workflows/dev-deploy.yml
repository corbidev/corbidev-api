# Ce workflow déploie automatiquement sur le serveur DEV après merge dans develop

name: 🚀 Déploiement DEV

on:
  pull_request:
    branches: [ develop ]
    types: [ closed ]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: dev-deploy-${{ github.event.pull_request.head.ref }}
  cancel-in-progress: true

jobs:
  deploy-dev:
    name: 🚀 Déploiement DEV
    if: github.event.pull_request.merged == true
    uses: LeZouzouEnWeb/workflows/.github/workflows/deploy.yml@V1.0.5
    permissions:
      contents: write
      pull-requests: write
    secrets:
      # Secrets requis pour le déploiement SSH
      REMOTE_CHEMIN: ${{ secrets.REMOTE_CHEMIN }}        # Chemin de base sur le serveur
      SFTP_HOST: ${{ secrets.SFTP_HOST }}                # Adresse du serveur
      SFTP_USER: ${{ secrets.SFTP_USER }}                # Utilisateur SSH
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}    # Clé privée SSH
    with:
      # Variables pour construire le chemin distant
      ADRESSE_GLOBAL: ${{ vars.ADRESSE_GLOBAL }}         # Ex: www
      ADRESSE_LOCAL: ${{ vars.ADRESSE_LOCAL }}           # Ex: mon-site
      remote_env: 'dev'
      PATH_ORDER: 'env-local'
      enable_mirror: false
