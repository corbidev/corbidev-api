name: 🔒 Vérification PR develop → homol

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    branches:
      - homol

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  check-pr-source:
    name: 🔒 Vérification PR develop → homol
    uses: LeZouzouEnWeb/workflows/.github/workflows/check-pr-source.yml@v1.0.10
    permissions:
      contents: read
      issues: write
      pull-requests: write
    with:
      source_branch: develop
      target_branch: homol
