# config/services.yaml

parameters:
    auth_host: '%env(AUTH_HOST)%'
    api_host: '%env(API_HOST)%'

services:

    _defaults:
        autowire: true
        autoconfigure: true

    # =========================
    # 🔥 Chargement automatique de l'app
    # =========================
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Kernel.php'

    # =========================
    # 🧠 Cache Tenant
    # =========================
    tenant.cache:
        class: Symfony\Component\Cache\Adapter\FilesystemAdapter
        arguments:
            $namespace: 'tenant'
            $defaultLifetime: 3600

    # =========================
    # 📊 Logs - TenantProvider
    # =========================
    App\Api\Logs\Context\TenantProvider:
        arguments:
            $cache: '@tenant.cache'


    # =========================
    # 📊 Error - Mapping http status 
    # =========================

    App\Http\HttpStatusProvider:
        arguments:
            $filePath: '%kernel.project_dir%/config/http_statuses.fr.json'
