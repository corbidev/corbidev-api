monolog:
    channels: ['app', 'business']

# -------------------------
# DEV
# -------------------------
when@dev:
    monolog:
        handlers:

            # logs techniques
            main:
                type: stream
                path: "%kernel.logs_dir%/dev.log"
                level: debug
                channels: ["!event"]

            # 🔥 erreurs 500 horodatées (appelées dynamiquement)
            error_file:
                type: stream
                path: "%kernel.logs_dir%/error.log"
                level: error

            # 🔥 logs métier
            business:
                type: stream
                path: "%kernel.logs_dir%/business.log"
                level: info
                channels: ["business"]

            console:
                type: console
                process_psr_3_messages: false
                channels: ["!event", "!doctrine", "!console"]

# -------------------------
# PROD
# -------------------------
when@prod:
    monolog:
        handlers:

            main:
                type: fingers_crossed
                action_level: error
                handler: nested
                excluded_http_codes: [404, 405]
                buffer_size: 50

            nested:
                type: stream
                path: php://stderr
                level: debug
                formatter: monolog.formatter.json

            # 🔥 erreurs 500 (fallback)
            error_file:
                type: stream
                path: "%kernel.logs_dir%/error.log"
                level: error

            # 🔥 logs métier
            business:
                type: stream
                path: "%kernel.logs_dir%/business.log"
                level: info
                channels: ["business"]

            console:
                type: console
                process_psr_3_messages: false
                channels: ["!event", "!doctrine"]

            deprecation:
                type: stream
                channels: [deprecation]
                path: php://stderr
                formatter: monolog.formatter.json
